<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тренды 2026</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: Manrope, "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
      }

      #c37 {
        width: 100%;
        height: 100%;
        font-family: Manrope, "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="c37"></div>
    <script src="./trend-deck-legacy.js"></script>
    <script>
      (() => {
        const labels = [
          ['btn-tab-daily', 'Карта'],
          ['btn-tab-collection', 'Коллекция'],
          ['btn-tab-authors', 'Авторы']
        ];

        const ensureDailyTitle = () => {
          const root = document.getElementById('c37');
          if (!root) return null;

          let title = document.getElementById('trend-daily-title');
          if (!title) {
            title = document.createElement('div');
            title.id = 'trend-daily-title';
            title.textContent = 'Карта тренда';
            root.appendChild(title);
          }

          const onboarding = document.getElementById('onboarding-view');
          const dailyTab = document.getElementById('btn-tab-daily');
          const isOnboarding = onboarding?.classList.contains('visible');
          const isDaily = dailyTab?.classList.contains('active');
          title.classList.toggle('is-visible', Boolean(isDaily && !isOnboarding));
          return title;
        };

        const setButtonText = (button, label) => {
          if (!button) return;
          button.childNodes.forEach((node) => {
            if (node.nodeType === Node.TEXT_NODE) node.nodeValue = label;
          });
        };

        const cleanTrendNav = () => {
          labels.forEach(([id, label]) => setButtonText(document.getElementById(id), label));
          ensureDailyTitle();

          const share = document.getElementById('share-btn');
          if (share) {
            const nav = share.closest('.nav');
            if (nav && nav.firstElementChild !== share) {
              nav.insertBefore(share, nav.firstElementChild);
            }
            share.classList.add('nav-home-btn');

            if (!share.dataset.miroHome) {
              share.dataset.miroHome = 'true';
              share.innerHTML = '<span class="material-icons-round" aria-hidden="true">home</span><span>Главная</span>';
              share.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopImmediatePropagation();
                window.parent?.postMessage({ type: 'mirofaktura:navigate', page: 'home' }, '*');
              }, true);
            }
          }
        };

        cleanTrendNav();
        const titleObserverTarget = document.getElementById('c37');
        if (titleObserverTarget) {
          const titleObserver = new MutationObserver(() => ensureDailyTitle());
          titleObserver.observe(titleObserverTarget, {
            subtree: true,
            attributes: true,
            attributeFilter: ['class', 'style']
          });
        }
        const navTimer = window.setInterval(cleanTrendNav, 80);
        window.setTimeout(() => {
          window.clearInterval(navTimer);
          cleanTrendNav();
        }, 1800);
      })();
    </script>
    <style>

        font-family: Manrope, "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif !important;

        font-size: 10px !important;
        letter-spacing: 0 !important;

      }

      #c37 .nav-item.active,

      #c37 .nav-share-btn:focus-visible {

          rgba(226, 253, 248, 0.68) !important;

      }

      #c37 .nav-item.active::after {
        display: none !important;
      }

      #c37 .nav-item .material-icons-round,
      #c37 .nav-share-btn .material-icons-round {

      #c37 .nav-share-btn span:last-child {

      #c37 #gameover-view > div,

      }

      #c37 .modal-content,
      #c37 .author-card {

      #c37 #authors-view .author-name {
